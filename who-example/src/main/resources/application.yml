spring:
  datasource:
    url: jdbc:h2:mem:who;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  sql:
    init:
      mode: always
      schema-locations:
        - classpath:org/jwcarman/who/jdbc/schema.sql
        - classpath:org/jwcarman/who/rbac/schema.sql
        - classpath:org/jwcarman/who/jwt/schema.sql
        - classpath:schema.sql
      data-locations:
        - classpath:data.sql

  security:
    oauth2:
      client:
        registration:
          demo-client:
            client-id: demo-client
            client-secret: secret
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: openid,profile,email
        provider:
          demo-client:
            # Use explicit endpoints instead of issuer-uri to avoid OIDC discovery at startup
            authorization-uri: http://localhost:8080/oauth2/authorize
            token-uri: http://localhost:8080/oauth2/token
            jwk-set-uri: http://localhost:8080/oauth2/jwks
            user-info-uri: http://localhost:8080/userinfo
            user-name-attribute: sub

      resourceserver:
        jwt:
          # Use explicit JWK set URI instead of issuer-uri to avoid OIDC discovery at startup
          jwk-set-uri: http://localhost:8080/oauth2/jwks

logging:
  level:
    org.jwcarman.who: DEBUG
